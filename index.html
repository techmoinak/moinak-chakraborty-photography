<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moinak Photography</title>
    <meta
      name="description"
      content="A cinematic photography portfolio for portraits, streets, landscapes, and events."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Primary navigation">
      <a class="brand" href="#top" aria-label="Moinak Photography home">
        <span class="brand-mark">M</span>
        <span>Moinak Photography</span>
      </a>
      <nav>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-label="Photography portfolio introduction">
        <img 
          src="images/web/the_real_one.jpg"
          alt="street session in light"
        />
        <div class="hero-content">
          <h1>Moments of life</h1>
          <p>
            A focused portfolio for showing selected work, telling the story
            behind the frame
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#work">View Gallery</a>
          </div>
        </div>
        <a class="scroll-cue" href="#work" aria-label="Scroll to gallery">↓</a>
      </section>

      <section class="section" id="work">
        <div class="section-heading">
          <p class="eyebrow">Selected Work</p>
        </div>

        <div class="gallery">
          <button class="photo-card tall" type="button" data-category="street">
            <img
              src="images/web/L1120883.jpg"
              alt="Two figures caught mid-step through a glass office doorway at night"
            />
            <span><strong>Between Doors</strong></span>
          </button>
          <button class="photo-card tall" type="button" data-category="portrait">
            <img
              src="images/web/136565010036.jpg"
              alt="Close portrait of a woman smiling in a blue beanie and yellow scarf"
            />
            <span><strong>Warm Light</strong></span>
          </button>
          <button class="photo-card wide tall" type="button" data-category="event">
            <img
              src="images/web/DSC_8891.jpg"
              alt="Children lighting firecrackers amid confetti during a Lunar New Year street celebration"
            />
            <span><strong>Lunar New Year</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="street">
            <img
              src="images/web/nyc-taxi-steam.jpg"
              alt="A man crosses a New York avenue as steam rises between yellow cabs"
            />
            <span><strong>Steam on Fifth</strong></span>
          </button>
          <button class="photo-card tall" type="button" data-category="portrait">
            <img
              src="images/web/the-painter.jpg"
              alt="An elderly woman smiles while painting at a table strung with colorful lanterns"
            />
            <span><strong>The Painter</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="event">
            <img
              src="images/web/the-ceremony.jpg"
              alt="A bride and groom sit together during a traditional Indian wedding ceremony"
            />
            <span><strong>The Ceremony</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="street">
            <img
              src="images/web/table-for-two.jpg"
              alt="A host gestures toward the door of a busy restaurant as a couple walks in"
            />
            <span><strong>Table for Two</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="street">
            <img
              src="images/web/after-hours.jpg"
              alt="Two friends share a quiet smoke against a lit sign at night"
            />
            <span><strong>After Hours</strong></span>
          </button>
          <button class="photo-card tall" type="button" data-category="portrait">
            <img
              src="images/web/times-square-glow.jpg"
              alt="A portrait lit by colorful neon light in Times Square"
            />
            <span><strong>Times Square Glow</strong></span>
          </button>
          <button class="photo-card wide" type="button" data-category="street">
            <img
              src="images/web/starry-night.jpg"
              alt="A museum visitor leans in to study Van Gogh's Starry Night"
            />
            <span><strong>Starry Night</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="portrait">
            <img
              src="images/web/fearless.jpg"
              alt="Close-up of tattooed knuckles spelling fearless"
            />
            <span><strong>Fearless</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="portrait">
            <img
              src="images/web/nashville-nights.jpg"
              alt="A portrait lit by neon bar signs on a Nashville street at night"
            />
            <span><strong>Nashville Nights</strong></span>
          </button>
          <button class="photo-card wide" type="button" data-category="street">
            <img
              src="images/web/fountain-mist.jpg"
              alt="A father and two children stand in fountain mist on a city street"
            />
            <span><strong>Fountain Mist</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="street">
            <img
              src="images/web/long-shadows.jpg"
              alt="Commuters cross paths on a sunlit New York City sidewalk"
            />
            <span><strong>Long Shadows</strong></span>
          </button>
          <button class="photo-card" type="button" data-category="street">
            <img
              src="images/web/snow-on-broadway.jpg"
              alt="A traveler pulls a suitcase through falling snow in Times Square"
            />
            <span><strong>Snow on Broadway</strong></span>
          </button>
        </div>
      </section>

      <section class="section contact" id="contact">
        <div class="section-heading">
          <p class="eyebrow">Contact</p>
        </div>
        <a class="contact-email" href="mailto:techmoinak@gmail.com">techmoinak@gmail.com</a>
      </section>
    </main>

    <div class="lightbox" aria-hidden="true">
      <button class="lightbox-close" type="button" aria-label="Close image">×</button>
      <img src="" alt="" />
      <p></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
